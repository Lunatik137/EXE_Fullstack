services:
  # Backend Service (Production env)
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exe-backend
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - ./backend/.env.production
    environment:
      PORT: 4000
      NODE_ENV: production
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - exe-network
    command: node server.js

  # Frontend Service (Production env)
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exe-frontend
    restart: unless-stopped
    expose:
      - "5173"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    networks:
      - exe-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: exe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - exe-network

  # Certbot SSL
  certbot:
    image: certbot/certbot
    container_name: exe-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-webroot:
    external: true
    name: certbot_webroot
  certbot-certs:
    external: true
    name: certbot_certs

networks:
  exe-network:
    driver: bridge
