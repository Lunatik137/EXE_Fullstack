services:
  # Backend Service
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exe-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URL: mongodb://host.docker.internal:27017/EXE_dev
      JWT_SECRET: ThisIsASecretKeyForJWT
      NODE_ENV: development
    volumes:
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    networks:
      - exe-network
    command: npm run server

  # Frontend Service - Vite Dev Server
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exe-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - exe-network

networks:
  exe-network:
    driver: bridge
