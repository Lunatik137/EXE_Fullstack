<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="256" viewBox="0 0 1536 256" fill="none">
  <defs>
    <linearGradient id="discFill" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBF5"/>
      <stop offset="1" stop-color="#E8F5E9"/>
    </linearGradient>

    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#81C784"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>

    <linearGradient id="leafBrightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8F5B9"/>
      <stop offset="1" stop-color="#38A14A"/>
    </linearGradient>

    <linearGradient id="flameGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A5DFA8"/>
      <stop offset="1" stop-color="#1F6D2E"/>
    </linearGradient>

    <linearGradient id="legendaryFlame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC107"/>
      <stop offset="0.45" stop-color="#A9D66A"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>

    <radialGradient id="softGlowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(70)">
      <stop stop-color="#81C784" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#81C784" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="softGlowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(78)">
      <stop stop-color="#FFC107" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>

    <filter id="dropSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2E7D32" flood-opacity="0.2"/>
    </filter>

    <filter id="dropStrong" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#184D22" flood-opacity="0.3"/>
    </filter>

    <g id="baseDisc">
      <circle cx="0" cy="0" r="84" fill="url(#discFill)"/>
      <circle cx="0" cy="0" r="84" fill="none" stroke="#2E7D32" stroke-opacity="0.18" stroke-width="2"/>
    </g>

    <g id="smallSparkles">
      <path d="M0 -8L2.2 -2L8 0L2.2 2L0 8L-2.2 2L-8 0L-2.2 -2L0 -8Z" fill="#E8F5E9"/>
    </g>
  </defs>

  <!-- 3 days: single fresh leaf -->
  <g transform="translate(128 128)" filter="url(#dropSoft)">
    <use href="#baseDisc"/>
    <circle cx="0" cy="6" r="42" fill="url(#softGlowGreen)" fill-opacity="0.5"/>
    <path d="M0 40C-16 25 -19 -2 0 -32C19 -2 16 25 0 40Z" fill="url(#leafGrad)" transform="rotate(7 0 6)"/>
    <path d="M0 31V-24" stroke="#E8F5E9" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round" transform="rotate(7 0 6)"/>
  </g>

  <!-- 7 days: brighter double leaf with subtle glow -->
  <g transform="translate(384 128)" filter="url(#dropSoft)">
    <use href="#baseDisc"/>
    <circle cx="0" cy="4" r="52" fill="url(#softGlowGreen)" fill-opacity="0.6"/>

    <rect x="-2.5" y="16" width="5" height="18" rx="2.5" fill="#2E7D32"/>

    <path d="M0 24C7 11 16 -6 28 -22C30 -9 27 10 16 24C11 30 6 33 0 35C-1 30 -1 27 0 24Z" fill="url(#leafBrightGrad)"/>
    <path d="M0 24C-7 11 -16 -6 -28 -22C-30 -9 -27 10 -16 24C-11 30 -6 33 0 35C1 30 1 27 0 24Z" fill="url(#leafGrad)"/>

    <path d="M3 28C7 15 14 1 23 -13" stroke="#E8F5E9" stroke-opacity="0.66" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-3 28C-7 15 -14 1 -23 -13" stroke="#E8F5E9" stroke-opacity="0.66" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- 14 days: healthy centered sprout with green growth aura -->
  <g transform="translate(640 128)" filter="url(#dropSoft)">
    <use href="#baseDisc"/>

    <circle cx="0" cy="18" r="40" fill="url(#softGlowGreen)" fill-opacity="0.56"/>
    <ellipse cx="0" cy="36" rx="36" ry="10" fill="#81C784" fill-opacity="0.34"/>
    <ellipse cx="0" cy="34" rx="25" ry="6" fill="#E8F5E9" fill-opacity="0.48"/>

    <ellipse cx="0" cy="-2" rx="26" ry="18" fill="#81C784" fill-opacity="0.14"/>

    <rect x="-3" y="-6" width="6" height="42" rx="3" fill="#2E7D32"/>
    <path d="M0 10C0 -6 10 -20 29 -28C21 -15 15 -3 0 10Z" fill="url(#leafGrad)"/>
    <path d="M0 12C0 -2 -9 -14 -24 -19C-20 -7 -14 2 0 12Z" fill="url(#leafBrightGrad)"/>

    <circle cx="0" cy="-15" r="2.8" fill="#E8F5E9" fill-opacity="0.7"/>
  </g>

  <!-- 30 days: thriving plant with soft energy -->
  <g transform="translate(896 128)" filter="url(#dropStrong)">
    <use href="#baseDisc"/>
    <circle cx="0" cy="0" r="66" fill="url(#softGlowGreen)"/>

    <rect x="-4" y="-8" width="8" height="52" rx="4" fill="#2E7D32"/>
    <path d="M0 2C0 -18 13 -36 38 -44C30 -27 20 -8 0 2Z" fill="url(#leafBrightGrad)"/>
    <path d="M0 10C0 -8 -12 -24 -33 -31C-27 -16 -18 -1 0 10Z" fill="url(#leafGrad)"/>
    <path d="M0 26C0 9 10 -6 28 -13C22 -1 15 13 0 26Z" fill="url(#leafGrad)"/>
    <path d="M0 28C0 12 -9 -1 -25 -7C-21 4 -14 17 0 28Z" fill="url(#leafBrightGrad)"/>

    <path d="M-56 8C-51 -9 -35 -24 -16 -29" stroke="#81C784" stroke-opacity="0.65" stroke-width="4" stroke-linecap="round"/>
    <path d="M56 -2C48 -20 32 -30 14 -34" stroke="#81C784" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 60 days: flourishing plant plus green flame -->
  <g transform="translate(1152 128)" filter="url(#dropStrong)">
    <use href="#baseDisc"/>
    <circle cx="0" cy="2" r="68" fill="url(#softGlowGreen)"/>

    <path d="M0 58C-36 37 -42 -3 -18 -26C-7 -37 0 -49 0 -62C0 -48 7 -38 19 -28C43 -7 35 34 0 58Z" fill="url(#flameGreen)" fill-opacity="0.86"/>

    <rect x="-3.5" y="8" width="7" height="34" rx="3.5" fill="#2E7D32"/>
    <path d="M0 8C0 -8 11 -20 30 -26C24 -14 17 -3 0 8Z" fill="url(#leafBrightGrad)"/>
    <path d="M0 14C0 1 -9 -9 -23 -13C-19 -4 -13 6 0 14Z" fill="url(#leafGrad)"/>
    <path d="M0 26C0 14 8 4 20 0C16 8 11 17 0 26Z" fill="url(#leafGrad)"/>
    <path d="M0 28C0 17 -7 8 -18 4C-14 12 -9 20 0 28Z" fill="url(#leafBrightGrad)"/>
  </g>

  <!-- 90 days: legendary golden-green flame with premium details -->
  <g transform="translate(1408 128)" filter="url(#dropStrong)">
    <use href="#baseDisc"/>
    <circle cx="0" cy="0" r="74" fill="url(#softGlowGold)"/>

    <circle cx="0" cy="0" r="78" fill="none" stroke="#FFC107" stroke-opacity="0.45" stroke-width="3"/>

    <path d="M0 62C-40 40 -47 -5 -22 -30C-8 -43 0 -56 0 -72C0 -55 9 -42 24 -31C50 -11 41 37 0 62Z" fill="url(#legendaryFlame)"/>
    <path d="M0 46C-19 35 -22 10 -10 -4C-4 -11 0 -18 0 -26C0 -18 4 -12 10 -5C22 8 19 31 0 46Z" fill="#E8F5E9" fill-opacity="0.5"/>

    <path d="M-7 8C-20 -6 -35 -12 -52 -12C-37 -2 -27 10 -22 26" stroke="#81C784" stroke-width="5" stroke-linecap="round"/>
    <path d="M7 8C20 -7 35 -12 51 -9C37 0 26 13 21 27" stroke="#B7D986" stroke-width="5" stroke-linecap="round"/>

    <path d="M0 20C0 6 10 -4 25 -8C20 1 14 10 0 20Z" fill="#81C784"/>
    <path d="M0 22C0 10 -8 1 -20 -2C-16 6 -11 14 0 22Z" fill="#2E7D32"/>

    <g transform="translate(-38 -40)">
      <use href="#smallSparkles"/>
    </g>
    <g transform="translate(40 -32) scale(0.8)">
      <use href="#smallSparkles"/>
    </g>
    <g transform="translate(26 44) scale(0.65)">
      <use href="#smallSparkles"/>
    </g>
  </g>
</svg>
