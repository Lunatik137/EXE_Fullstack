# HTTP: chỉ phục vụ certbot challenge, redirect còn lại sang HTTPS
server {
    listen 80;
    server_name greenpath.id.vn www.greenpath.id.vn;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name greenpath.id.vn www.greenpath.id.vn;

    ssl_certificate /etc/letsencrypt/live/greenpath.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greenpath.id.vn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Backend API
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend uploads/static files
    location /uploads/ {
        proxy_pass http://backend:4000;
    }

    location /images/ {
        proxy_pass http://backend:4000;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
    }
}
